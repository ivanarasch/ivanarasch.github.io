<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#0a0a08}
body{
  background:#f5f0ec;
  color:#0a0a08;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  line-height:1.6;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:.9rem 2.5rem;
  background:rgba(245,240,236,0.88);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(10,10,8,.1);
}
.nav-l{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#aaa;display:flex;align-items:center;gap:.5rem}
.nav-dot{width:6px;height:6px;border-radius:50%;background:#d4607a;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-logo{font-family:'Abril Fatface',serif;font-size:1rem;letter-spacing:.04em;text-align:center}
.nav-r{display:flex;justify-content:flex-end;gap:2rem;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#999}
.nav-r a:hover{color:#d4607a}

/* ── HERO ── */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;flex-direction:column;justify-content:flex-end;
  overflow:hidden;
}
